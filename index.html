<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="JJS DE Leaderboard - Top 30 Players Season 2026">
<meta property="og:title" content="JJS DE Leaderboard">
<meta property="og:description" content="Official Germany JJS Leaderboard Season 2026">
<title>JJS DE Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #CC0000;
  --red2: #FF2200;
  --gold: #FFCC00;
  --gold2: #C9A000;
  --bg: #07070e;
  --s1: #111120;
  --s2: #181828;
  --s3: #1f1f33;
  --b1: rgba(255,255,255,0.055);
  --b2: rgba(255,255,255,0.10);
  --b3: rgba(204,0,0,0.25);
  --text: #e8e8f0;
  --t2: #b0b0c8;
  --muted: #6a6a88;
  --discord: #5865F2;
  --roblox: #E53935;
  --r1c: #FFCC00;
  --r2c: #C0C0C0;
  --r3c: #CD7F32;
  --ok: #00D68F;
  --fd: 'Rajdhani', sans-serif;
  --fb: 'Outfit', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r: 10px;
  --rl: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--fb); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

/* BG */
.bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% -5%, rgba(204,0,0,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 105%, rgba(255,204,0,0.07) 0%, transparent 55%);
}
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 52px 52px;
}
.stripe { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 500; background: linear-gradient(90deg, #000000 33.33%, #CC0000 33.33% 66.66%, #FFCC00 66.66%); }

/* LAYOUT */
.page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }

/* HEADER */
.hdr { padding: 56px 0 32px; text-align: center; }
.flag-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 14px; }
.flag { display: flex; flex-direction: column; width: 32px; height: 22px; border-radius: 3px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); flex-shrink: 0; }
.flag s { display: block; flex: 1; font-size: 0; }
.fa { background: #000; }
.fb2 { background: #CC0000; }
.fc { background: #FFCC00; }
.eyebrow { font-family: var(--fm); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--t2); opacity: .7; }
.title { font-family: var(--fd); font-weight: 700; font-size: clamp(44px, 10vw, 96px); letter-spacing: 5px; line-height: .95; text-transform: uppercase; margin-bottom: 12px; }
.tj { color: #fff; }
.td { color: var(--gold); font-size: .55em; vertical-align: super; letter-spacing: 3px; margin-left: 6px; }
.tsub { font-family: var(--fm); font-size: 10.5px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-top: 10px; }
.sbadge { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; background: var(--s2); border: 1px solid var(--b3); border-radius: 20px; padding: 5px 14px; font-family: var(--fm); font-size: 10px; letter-spacing: 2px; color: var(--red2); }
.dot-pulse { width: 5px; height: 5px; border-radius: 50%; background: var(--red2); animation: pulse 1.8s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.6); } }
.meta { text-align: center; margin: 16px 0 32px; font-family: var(--fm); font-size: 9.5px; letter-spacing: 2px; color: var(--muted); }
.meta span { color: var(--t2); }

/* TABS */
.tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 28px; padding: 5px; background: var(--s1); border: 1px solid var(--b1); border-radius: var(--rl); max-width: 380px; margin-left: auto; margin-right: auto; }
.tab { flex: 1; padding: 10px 14px; background: transparent; border: none; border-radius: var(--r); color: var(--muted); font-family: var(--fd); font-size: 15px; font-weight: 600; letter-spacing: 1px; transition: all .22s; -webkit-tap-highlight-color: transparent; }
.tab:hover { color: var(--t2); }
.tab.on { background: linear-gradient(135deg, var(--red), #8B0000); color: #fff; box-shadow: 0 3px 18px rgba(204,0,0,0.4); }
.tab small { display: block; font-size: 9px; font-weight: 400; letter-spacing: 1px; opacity: .6; font-family: var(--fm); margin-top: 1px; }

/* SECTIONS */
.sec { display: none; }
.sec.on { display: block; animation: secIn .3s ease; }
@keyframes secIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* CARD LIST */
.lb { display: flex; flex-direction: column; gap: 7px; }

/* CARD */
.card {
  display: grid;
  grid-template-columns: 50px 58px 1fr auto;
  align-items: center;
  gap: 16px;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: var(--r);
  padding: 14px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .25s, background .25s, box-shadow .25s;
  animation: cardIn .4s ease both;
}
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--stripe); }
.card:hover { border-color: var(--b2); background: var(--s2); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
.card.vacant { opacity: .35; }
.card.vacant:hover { box-shadow: none; }
@keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* RANK */
.rnum { font-family: var(--fd); font-weight: 700; font-size: 24px; text-align: center; line-height: 1; color: var(--muted); flex-shrink: 0; }
.rnum.r1 { color: var(--r1c); text-shadow: 0 0 20px rgba(255,204,0,.5); }
.rnum.r2 { color: var(--r2c); text-shadow: 0 0 20px rgba(192,192,192,.4); }
.rnum.r3 { color: var(--r3c); text-shadow: 0 0 20px rgba(205,127,50,.4); }

/* AVATAR */
.av { width: 54px; height: 54px; border-radius: 9px; background: var(--s2); border: 1px solid var(--b2); display: flex; align-items: center; justify-content: center; font-family: var(--fd); font-weight: 700; font-size: 20px; color: var(--muted); overflow: hidden; flex-shrink: 0; }
.av img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

/* INFO */
.inf { min-width: 0; }
.pname { font-family: var(--fd); font-size: 17px; font-weight: 700; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.pname.na { color: var(--muted); font-weight: 500; letter-spacing: 0; font-style: italic; }
.pdesc { font-size: 11.5px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: .75; }

/* SOCIAL */
.soc-col { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.soc-mob { display: none; gap: 6px; }
.soc {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 9px;
  border: 1px solid var(--b2); background: var(--s2);
  font-size: 13px; font-family: var(--fm); font-weight: 500;
  color: var(--t2); flex-shrink: 0;
  transition: all .22s; -webkit-tap-highlight-color: transparent;
  position: relative;
}
.soc:hover { transform: translateY(-3px); }
.soc.rb:hover { background: var(--roblox); border-color: var(--roblox); color: #fff; box-shadow: 0 5px 16px rgba(229,57,53,.4); }
.soc.dc:hover { background: var(--discord); border-color: var(--discord); color: #fff; box-shadow: 0 5px 16px rgba(88,101,242,.4); }
.soc.cl:hover { background: #2d2f5e; border-color: var(--discord); color: #fff; box-shadow: 0 5px 16px rgba(45,47,94,.5); }
.soc.off { opacity: .18; pointer-events: none; }
.soc::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #000; color: #fff; font-family: var(--fm); font-size: 9px; letter-spacing: 1px; white-space: nowrap; padding: 4px 8px; border-radius: 5px; opacity: 0; pointer-events: none; transition: opacity .15s; }
.soc:hover::after { opacity: 1; }

/* SKELETON */
.skel { display: flex; flex-direction: column; gap: 7px; }
.skel-c { height: 82px; border-radius: var(--r); background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ADMIN LINK */
.adm-link { position: fixed; top: 16px; right: 18px; z-index: 400; background: var(--s2); border: 1px solid var(--b2); color: var(--muted); font-family: var(--fm); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 14px; border-radius: 7px; transition: all .2s; }
.adm-link:hover { border-color: var(--red); color: var(--red); }

/* FOOTER */
footer { text-align: center; padding: 40px 0 20px; font-family: var(--fm); font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .card { grid-template-columns: 40px 46px 1fr; gap: 10px; padding: 11px 14px; }
  .soc-col { display: none; }
  .soc-mob { display: flex; }
  .rnum { font-size: 19px; }
  .av { width: 46px; height: 46px; font-size: 17px; }
  .pname { font-size: 15px; }
  .tabs { max-width: 100%; }
  .tab { padding: 9px 10px; font-size: 14px; }
  .adm-link { top: 12px; right: 12px; padding: 7px 12px; font-size: 8px; }
}
@media (max-width: 380px) {
  .card { gap: 8px; padding: 10px 11px; }
  .av { width: 40px; height: 40px; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="stripe"></div>
<a class="adm-link" href="admin.html">Admin</a>

<div class="page">
  <header class="hdr">
    <div class="flag-row">
      <div class="flag"><s class="fa"></s><s class="fb2"></s><s class="fc"></s></div>
      <span class="eyebrow">Germany - Official Rankings</span>
      <div class="flag"><s class="fa"></s><s class="fb2"></s><s class="fc"></s></div>
    </div>
    <h1 class="title"><span class="tj">JJS</span><span class="td">DE</span><br>Leaderboard</h1>
    <div class="tsub">Season 2026 - Top 30 Players</div>
    <div class="sbadge"><span class="dot-pulse"></span>Season 2026 Active</div>
  </header>

  <div class="meta" id="metaRow">Last updated: <span id="lastUpd">Loading...</span></div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('s10',this)">Top 10<small>Rank 1-10</small></button>
    <button class="tab" onclick="switchTab('s20',this)">Top 20<small>Rank 11-20</small></button>
    <button class="tab" onclick="switchTab('s30',this)">Top 30<small>Rank 21-30</small></button>
  </div>

  <div id="s10" class="sec on">
    <div class="lb" id="list10">
      <div class="skel" id="sk10"></div>
    </div>
  </div>
  <div id="s20" class="sec">
    <div class="lb" id="list20"></div>
  </div>
  <div id="s30" class="sec">
    <div class="lb" id="list30"></div>
  </div>
</div>

<footer>JJS DE Leaderboard - Season 2026 - All Rights Reserved</footer>

<script>
// CONFIG - set your GitHub username and repo name here
var OWNER = 'EEKdev';
var REPO  = 'jjs-leaderboard';

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.sec').forEach(function(s){ s.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
}

function showSkeletons() {
  ['list10','list20','list30'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.innerHTML = '<div class="skel">' + Array(10).fill('<div class="skel-c"></div>').join('') + '</div>';
  });
}

function stripeColor(r) {
  if(r===1) return '#FFCC00';
  if(r===2) return '#C0C0C0';
  if(r===3) return '#CD7F32';
  if(r<=5)  return '#CC0000';
  if(r<=10) return '#880000';
  if(r<=20) return '#443300';
  return '#222235';
}

function rankClass(r) {
  return r===1 ? 'r1' : r===2 ? 'r2' : r===3 ? 'r3' : '';
}

function rankLabel(r) {
  if(r===1) return '#1';
  if(r===2) return '#2';
  if(r===3) return '#3';
  return '#' + r;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function safeUrl(u) {
  if(!u) return '';
  u = u.trim();
  if(u.indexOf('http') === 0) return u;
  return 'https://' + u;
}

function socBtn(cls, label, url, tip) {
  var href = safeUrl(url);
  if(href) {
    return '<a class="soc ' + cls + '" href="' + esc(href) + '" target="_blank" rel="noopener" data-tip="' + tip + '">' + label + '</a>';
  }
  return '<span class="soc ' + cls + ' off" data-tip="' + tip + ' - not set">' + label + '</span>';
}

function cardHTML(p, delay) {
  var vacant = !p.name || p.name === 'N/A';
  var av = p.img
    ? '<img src="' + esc(p.img) + '" alt="" loading="lazy">'
    : (vacant ? '-' : esc(p.name.charAt(0).toUpperCase()));
  var soc = [
    socBtn('rb', 'R', p.roblox,      'Roblox'),
    socBtn('dc', 'D', p.discord,     'Discord'),
    socBtn('cl', 'C', p.clanDiscord, 'Clan')
  ].join('');
  return [
    '<div class="card' + (vacant ? ' vacant' : '') + '"',
    ' style="--stripe:' + stripeColor(p.rank) + ';animation-delay:' + (delay*0.04) + 's">',
    '<div class="rnum ' + rankClass(p.rank) + '">' + rankLabel(p.rank) + '</div>',
    '<div class="av">' + av + '</div>',
    '<div class="inf">',
    '<div class="pname' + (vacant ? ' na' : '') + '">' + (vacant ? 'N/A' : esc(p.name)) + '</div>',
    '<div class="pdesc">' + (p.desc ? esc(p.desc) : '-') + '</div>',
    '<div class="soc-mob">' + soc + '</div>',
    '</div>',
    '<div class="soc-col">' + soc + '</div>',
    '</div>'
  ].join('');
}

function renderAll(json) {
  var players = json.players || [];
  var upd = json.meta && json.meta.lastUpdated;
  var updEl = document.getElementById('lastUpd');
  if(updEl) updEl.textContent = upd ? new Date(upd).toLocaleString() : 'never';

  [[1,10,'list10'],[11,20,'list20'],[21,30,'list30']].forEach(function(range){
    var start = range[0], end = range[1], id = range[2];
    var el = document.getElementById(id);
    if(!el) return;
    var html = '';
    for(var r = start; r <= end; r++) {
      var found = null;
      for(var i=0;i<players.length;i++){ if(players[i].rank===r){ found=players[i]; break; } }
      var p = found || {rank:r,name:'N/A',desc:'',roblox:'',discord:'',clanDiscord:'',img:''};
      html += cardHTML(p, r - start);
    }
    el.innerHTML = html;
  });
}

function fetchData() {
  var url = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/main/data.json?t=' + Date.now();
  showSkeletons();
  fetch(url)
    .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(json){ renderAll(json); })
    .catch(function(e){
      console.error(e);
      ['list10','list20','list30'].forEach(function(id){
        var el = document.getElementById(id);
        if(el) el.innerHTML = '<div style="text-align:center;padding:40px;font-family:monospace;font-size:11px;color:#6a6a88">Failed to load - check OWNER config</div>';
      });
    });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
